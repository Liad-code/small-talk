<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Custom Game</title>
  <style>
    body {
      font-family: 'Nunito', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #f0f4ff, #fff0f5);
      text-align: center;
      padding: 2rem;
    }
    h1 { font-size: 2rem; color: #6C63FF; }
    p  { color: #666; font-size: 1.1rem; }
    .placeholder {
      background: white;
      border-radius: 24px;
      padding: 3rem;
      box-shadow: 0 8px 32px rgba(108,99,255,0.1);
      max-width: 500px;
    }
  </style>
</head>
<body>
  <div class="placeholder">
    <div style="font-size:5rem">🎮</div>
    <h1>Your Game Goes Here!</h1>
    <p>
      Replace this file with your own game.<br>
      The file is at: <code>/public/games/my-game-1/index.html</code>
    </p>
    <p style="margin-top:1rem; font-size:0.9rem; color:#999">
      Paste your existing HTML/JS game code here and it will be<br>
      served in an iframe inside the Small Talk platform.
    </p>
  </div>
</body>
</html>
